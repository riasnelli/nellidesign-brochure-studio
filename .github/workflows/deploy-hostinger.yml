name: Deploy to Hostinger

# Auto-builds the Vite app on every push to main and FTP-uploads dist/
# to Hostinger's public_html. Server-only files (gatewayhub-data/, brochures/, api/secrets.php)
# are excluded so live data and credentials are never overwritten.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npm run build

      - name: Write api/secrets.php from GitHub Secrets
        # Generates dist/api/secrets.php at build time using repo secrets so the
        # file is uploaded to the server on every deploy (and never committed
        # to git). Only RECAPTCHA_SECRET is required for the contact form; the
        # GatewayHub secrets can still come from Hostinger environment vars.
        env:
          GATEWAYHUB_ADMIN_EMAIL: ${{ secrets.GATEWAYHUB_ADMIN_EMAIL }}
          GATEWAYHUB_ADMIN_PASSWORD_HASH: ${{ secrets.GATEWAYHUB_ADMIN_PASSWORD_HASH }}
          GATEWAYHUB_JWT_SECRET: ${{ secrets.GATEWAYHUB_JWT_SECRET }}
          RECAPTCHA_SECRET: ${{ secrets.RECAPTCHA_SECRET }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
        run: |
          set -euo pipefail
          : "${RECAPTCHA_SECRET:?Missing GitHub secret RECAPTCHA_SECRET}"
          mkdir -p dist/api
          php_escape() { printf "%s" "$1" | sed -e "s/\\\\/\\\\\\\\/g" -e "s/'/\\\\'/g"; }
          RECAP_ESC=$(php_escape "$RECAPTCHA_SECRET")
          TO_ESC=$(php_escape "${CONTACT_TO_EMAIL:-hello@nellidesign.com}")
          cat > dist/api/secrets.php <<PHP
          <?php
          // AUTO-GENERATED on deploy from GitHub Secrets. Do not edit on server.
          if (!defined('GATEWAYHUB_INTERNAL')) { http_response_code(403); exit('Forbidden'); }
          // Contact form / spam protection — defined as constants AND env so
          // both lookup styles work regardless of PHP-FPM env handling.
          define('RECAPTCHA_SECRET', '${RECAP_ESC}');
          define('CONTACT_TO_EMAIL', '${TO_ESC}');
          putenv('RECAPTCHA_SECRET=${RECAP_ESC}');
          putenv('CONTACT_TO_EMAIL=${TO_ESC}');
          \$_ENV['RECAPTCHA_SECRET'] = '${RECAP_ESC}';
          \$_ENV['CONTACT_TO_EMAIL'] = '${TO_ESC}';
          PHP
          if [ -n "${GATEWAYHUB_ADMIN_EMAIL:-}" ]; then
            printf "define('ADMIN_EMAIL', '%s');\n" "$(php_escape "$GATEWAYHUB_ADMIN_EMAIL")" >> dist/api/secrets.php
          fi
          if [ -n "${GATEWAYHUB_ADMIN_PASSWORD_HASH:-}" ]; then
            printf "define('ADMIN_PASSWORD_HASH', '%s');\n" "$(php_escape "$GATEWAYHUB_ADMIN_PASSWORD_HASH")" >> dist/api/secrets.php
          fi
          if [ -n "${GATEWAYHUB_JWT_SECRET:-}" ]; then
            printf "define('JWT_SECRET', '%s');\n" "$(php_escape "$GATEWAYHUB_JWT_SECRET")" >> dist/api/secrets.php
          fi
          echo "Wrote dist/api/secrets.php ($(wc -c < dist/api/secrets.php) bytes)"

      - name: Force-upload api/secrets.php without deleting remote files
        # The normal sync can skip server-only files depending on sync state.
        # This uploads only secrets.php and never deletes anything on Hostinger.
        env:
          HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          HOSTINGER_FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_DIR: ${{ secrets.HOSTINGER_FTP_DIR }}
        run: |
          set -euo pipefail
          : "${HOSTINGER_FTP_HOST:?Missing GitHub secret HOSTINGER_FTP_HOST}"
          : "${HOSTINGER_FTP_USER:?Missing GitHub secret HOSTINGER_FTP_USER}"
          : "${HOSTINGER_FTP_PASSWORD:?Missing GitHub secret HOSTINGER_FTP_PASSWORD}"
          : "${HOSTINGER_FTP_DIR:?Missing GitHub secret HOSTINGER_FTP_DIR}"
          REMOTE_PATH="${HOSTINGER_FTP_DIR%/}/api/secrets.php"
          curl --fail --silent --show-error --ftp-create-dirs \
            --user "$HOSTINGER_FTP_USER:$HOSTINGER_FTP_PASSWORD" \
            --upload-file dist/api/secrets.php \
            "ftp://${HOSTINGER_FTP_HOST}/${REMOTE_PATH}"
          echo "Uploaded api/secrets.php directly"

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_FTP_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          # Protect live data + secrets on the server.
          # Patterns are matched against BOTH local files (won't upload)
          # AND remote files (won't delete). Use **/ prefix so the match
          # works at any depth on the server.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/gatewayhub-data/**
            gatewayhub-data/**
            **/brochures/**
            brochures/**
            **/api/config.local.php
            api/config.local.php
