name: Deploy to Hostinger

# Auto-builds the Vite app on every push to main and FTP-uploads dist/
# to Hostinger's public_html. Server-only files (gatewayhub-data/, brochures/, api/secrets.php)
# are excluded so live data and credentials are never overwritten.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: ${{ secrets.HOSTINGER_FTP_DIR }}
          local-dir: ./dist/
          dangerous-clean-slate: false
          # Protect live data + secrets on the server.
          # Patterns are matched against BOTH local files (won't upload)
          # AND remote files (won't delete). Use **/ prefix so the match
          # works at any depth on the server.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/gatewayhub-data/**
            gatewayhub-data/**
            **/brochures/**
            brochures/**
            **/api/secrets.php
            api/secrets.php
            **/api/config.local.php
            api/config.local.php
