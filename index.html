<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NelliDESiGN — Premium Brochure Design Studio</title>
    <meta name="description" content="Premium brochure design — company profiles, product catalogues and corporate brochures that convert. Fixed quote in 24 hours." />
    <meta name="author" content="NelliDESiGN" />
    <meta name="theme-color" content="#fdfaf6" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="canonical" href="/" />

    <meta property="og:title" content="NelliDESiGN — Premium Brochure Design" />
    <meta property="og:description" content="Conversion-led brochure design for ambitious brands. Strategy + craft, delivered print-ready." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Preload LCP hero image (responsive) -->
    <link
      rel="preload"
      as="image"
      href="/hero-brochures-lg.webp"
      imagesrcset="/hero-brochures-sm.webp 960w, /hero-brochures-lg.webp 1600w"
      imagesizes="(max-width: 768px) 100vw, 1200px"
      fetchpriority="high"
    />

    <!-- Preload critical self-hosted fonts (latin subset) -->
    <link rel="preload" href="/fonts/bricolage-500.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Self-hosted fonts (latin subset only — keeps payload small, no third-party hop) -->
    <style>
      @font-face {
        font-family: 'Bricolage Grotesque';
        font-style: normal;
        font-weight: 500 700;
        font-display: swap;
        src: url('/fonts/bricolage-500.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/inter-400.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/inter-600.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
